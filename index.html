<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster 1 – Single Price | Mango Poster Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;800;900&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
/* ── Design Token Architecture ── */
:root {
    --red: #d6001c;
    --red-dark: #9e0011;
    --yellow: #ffcc00;
    --black: #111111;
    --gray-bg: #fdfdfd;
    --gray-border: #e9ecef;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Barlow Condensed', sans-serif;
    background: #fcf8f8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
}

/* ── Premium Canvas Layout (A4 Ratio) ── */
.a4-page {
    width: 794px;
    height: 1123px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* Background Structural Frames */
.bg-frame-layer {
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(0, 0, 0, 0.05);
    pointer-events: none;
    z-index: 1;
}

/* ── Header Band ── */
.header-band {
    background: var(--black);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 35px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
}

.logo-wrap {
    display: flex;
    align-items: center;
}

.logo-img {
    height: 42px;
    width: auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}

.brand-tag {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--yellow);
    letter-spacing: 3px;
    white-space: nowrap;
}

/* ── Hero Promotion Segment ── */
.hero-section {
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    width: 100%;
    flex-shrink: 0;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 35px;
    height: 115px;
    overflow: hidden;
    z-index: 5;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.hero-section::before {
    content: '';
    position: absolute;
    right: -50px;
    top: -20px;
    width: 320px;
    height: 160px;
    background: var(--yellow);
    transform: skewX(-24deg);
    opacity: 0.15;
}

.hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 65px;
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 0.95;
    outline: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.hero-subtitle {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 5px;
    color: var(--yellow);
    text-transform: uppercase;
    outline: none;
    margin-top: 4px;
}

/* ── Main Dynamic Display Content ── */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 30px 45px 25px;
    min-height: 0;
    z-index: 5;
    background: radial-gradient(circle at center, #ffffff 0%, var(--gray-bg) 100%);
}

/* Product Identity Block */
.product-names {
    width: 100%;
    text-align: center;
    flex-shrink: 0;
    position: relative;
    padding: 15px 20px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    border: 1px solid var(--gray-border);
}

/* Typography Controls Overlays */
.font-size-control {
    display: none;
    align-items: center;
    gap: 8px;
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.98);
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px;
    z-index: 20;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    flex-direction: column;
}

.product-names:hover .font-size-control {
    display: flex;
}

.fsc-row {
    display: flex;
    align-items: center;
    gap: 6px;
}

.fsc-label {
    font-size: 10px;
    font-weight: 800;
    color: #777;
    width: 20px;
}

.fsc-btn {
    width: 24px;
    height: 24px;
    border: 1px solid #bbb;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
}

.fsc-btn:hover {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
}

.fsc-val {
    font-size: 11px;
    font-weight: 700;
    color: #444;
    min-width: 32px;
    text-align: center;
}

.translate-status {
    font-size: 11px;
    color: #888;
    margin-top: 6px;
    min-height: 15px;
    letter-spacing: 1px;
}

.product-en {
    font-size: 54px;
    font-weight: 900;
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 3px;
    outline: none;
    line-height: 1.1;
}

.product-ar {
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--red);
    direction: rtl;
    line-height: 1.2;
    outline: none;
    margin-top: 8px;
}

/* Image Graphic Presentation Frame */
.image-zone {
    width: 100%;
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 25px 0;
}

.image-inner {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    border: 2px dashed #ccd1d9;
    border-radius: 16px;
    overflow: hidden;
    min-width: 150px;
    min-height: 120px;
    transition: border-color 0.2s ease;
}

.image-inner:hover {
    border-color: var(--red);
}

/* Image Manipulation Interfaces */
.img-size-controls {
    display: none;
    position: absolute;
    top: 15px;
    right: 15px;
    z-index: 20;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    flex-direction: column;
    gap: 6px;
    align-items: center;
}

.img-size-controls.visible {
    display: flex;
}

.img-size-label {
    font-size: 10px;
    font-weight: 800;
    color: #666;
    letter-spacing: 1px;
}

.img-size-row {
    display: flex;
    align-items: center;
    gap: 6px;
}

.img-size-btn {
    width: 24px;
    height: 24px;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img-size-btn:hover {
    background: var(--black);
    color: #fff;
    border-color: var(--black);
}

.img-size-val {
    font-size: 11px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
}

.img-resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 28px;
    height: 28px;
    cursor: se-resize;
    z-index: 20;
    display: none;
}

.img-resize-handle::after {
    content: '';
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 12px;
    height: 12px;
    border-right: 3px solid var(--black);
    border-bottom: 3px solid var(--black);
}

/* Asset Upload Layout */
.upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 40px;
}

.upload-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--gray-bg);
    border: 1px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
}

.upload-zone:hover .upload-icon {
    transform: scale(1.05);
    background: #fff0f1;
    border-color: #ffccd0;
}

.upload-icon svg {
    width: 28px;
    height: 28px;
    fill: var(--red);
}

.upload-btn-lbl {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
}

#file-input { display: none; }
#product-preview {
    max-width: 100%;
    max-height: 100%;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    cursor: pointer;
}

/* ── Retail Pricing Architecture ── */
.price-section {
    width: 100%;
    flex-shrink: 0;
    position: relative;
    padding: 0 20px;
    margin-bottom: 15px;
}

.price-band {
    background: var(--black);
    width: 100%;
    border-radius: 16px;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.price-left {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 15px 35px;
}

.price-right {
    background: var(--yellow);
    padding: 15px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(25px 0, 100% 0, 100% 100%, 0 100%);
    flex-shrink: 0;
    min-width: 260px;
}

.price-en-wrap {
    display: flex;
    align-items: flex-start;
    gap: 10px;
}

.currency-en {
    font-size: 34px;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1.2;
    margin-top: 12px;
    outline: none;
}

.price-main-en {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 125px;
    color: #ffffff;
    line-height: 0.85;
    letter-spacing: -1px;
    outline: none;
}

.price-ar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    direction: rtl;
}

.price-main-ar {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 68px;
    color: var(--black);
    line-height: 1;
    outline: none;
}

.currency-ar {
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--black);
    outline: none;
}

/* ── Footer Metadata ── */
.footer-stripe {
    width: 100%;
    background: #ffffff;
    border-top: 1px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 35px;
    flex-shrink: 0;
    z-index: 10;
}

.footer-text {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
}

.footer-dots {
    display: flex;
    gap: 5px;
    align-items: center;
}

.footer-dots span {
    display: block;
    border-radius: 50%;
    background: var(--red);
}

.footer-dots span:nth-child(1) { width: 6px; height: 6px; opacity: 0.4; }
.footer-dots span:nth-child(2) { width: 9px; height: 9px; opacity: 1; }
.footer-dots span:nth-child(3) { width: 6px; height: 6px; opacity: 0.4; }

/* ── Print Media Optimization ── */
@page { size: A4; margin: 0; }
@media print {
    html, body {
        width: 210mm;
        height: 297mm;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
    }
    body { display: block; min-height: auto; }
    .a4-page {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
        overflow: hidden;
    }
    .font-size-control, .img-size-controls, .img-resize-handle,
    .translate-status, .upload-zone { display: none !important; }
    [contenteditable]:focus { outline: none !important; }
}
</style>
</head>
<body>

<div class="a4-page" id="a4">
    <div class="bg-frame-layer"></div>

    <div class="header-band">
        <div class="logo-wrap">
            <img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
        <span class="brand-tag">EXCLUSIVE LIMITED OFFER</span>
    </div>

    <div class="hero-section">
        <div class="hero-title" contenteditable="true" spellcheck="false">SUPER SAVERS</div>
        <div class="hero-subtitle" contenteditable="true" spellcheck="false">UNBEATABLE VALUE EVERY DAY</div>
    </div>

    <div class="main-content">
        

        <div class="image-zone">
            <div class="image-inner" id="image-inner">
                <div class="img-size-controls" id="img-size-controls">
                    <div class="img-size-label">IMAGE SCALE</div>
                    <div class="img-size-row">
                        <button class="img-size-btn" id="img-minus">−</button>
                        <span class="img-size-val" id="img-size-val">100%</span>
                        <button class="img-size-btn" id="img-plus">+</button>
                    </div>
                </div>
                <label class="upload-zone" for="file-input" id="upload-label">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 .707.293l4 4a1 1 0 0 1-1.414 1.414L13 5.414V16a1 1 0 0 1-2 0V5.414L8.707 7.707A1 1 0 0 1 7.293 6.293l4-4A1 1 0 0 1 12 2zM4 17a1 1 0 0 1 1 1v1h14v-1a1 1 0 0 1 2 0v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1z"/></svg>
                    </div>
                    <span class="upload-btn-lbl">Upload Product Asset</span>
                </label>
                <input type="file" id="file-input" accept="image/*">
                <img id="product-preview" src="#" alt="Preview">
                <div class="img-resize-handle" id="img-resize-handle"></div>
            </div>
        </div>
<div class="product-names" id="product-names">
            <div class="font-size-control" id="fsc-panel">
                <div class="fsc-row">
                    <span class="fsc-label">EN</span>
                    <button class="fsc-btn" id="en-minus">−</button>
                    <span class="fsc-val" id="en-size-val">54px</span>
                    <button class="fsc-btn" id="en-plus">+</button>
                </div>
                <div class="fsc-row" style="margin-top: 5px;">
                    <span class="fsc-label">AR</span>
                    <button class="fsc-btn" id="ar-minus">−</button>
                    <span class="fsc-val" id="ar-size-val">40px</span>
                    <button class="fsc-btn" id="ar-plus">+</button>
                </div>
            </div>
            <div class="product-en" id="product-en" contenteditable="true" spellcheck="false">FRESH PRODUCE</div>
            <div class="product-ar" id="product-ar" contenteditable="true" spellcheck="false">منتجات طازجة</div>
            <div class="translate-status" id="translate-status"></div>
        </div>
    </div>

    <div class="price-section">
        <div class="price-band">
            <div class="price-left">
                <div class="price-en-wrap">
                    <div class="currency-en" contenteditable="true" spellcheck="false">KD</div>
                    <div class="price-main-en" id="en-price" contenteditable="true" spellcheck="false">1.950</div>
                </div>
            </div>
            <div class="price-right">
                <div class="price-ar-wrap">
                    <div class="price-main-ar" id="ar-price"></div>
                    <div class="currency-ar" contenteditable="true" spellcheck="false">د.ك</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-strip">
        <span class="footer-text"></span>
        <div class="footer-dots"><span></span><span></span><span></span></div>
        <span class="footer-text"></span>
    </div>
</div>

<script src="js/shared.js"></script>
<script src="js/navbar.js"></script>
<script>
// Price synchronization logic link
bindPriceSync('en-price', 'ar-price');

// Client translation automated process script
bindAutoTranslate('product-en', 'product-ar', 'translate-status');

// Restrict multiple break lines within localized blocks
blockEnter('.product-en,.product-ar');

// Functional Display Sizing Engine
let enFs = 54, arFs = 40;
const productEn  = document.getElementById('product-en');
const productAr  = document.getElementById('product-ar');
const enSzVal    = document.getElementById('en-size-val');
const arSzVal    = document.getElementById('ar-size-val');

function setEnSize(s) { enFs = Math.max(10, Math.min(120, s)); productEn.style.fontSize = enFs + 'px'; enSzVal.textContent = enFs + 'px'; }
function setArSize(s) { arFs = Math.max(10, Math.min(160, s)); productAr.style.fontSize = arFs + 'px'; arSzVal.textContent = arFs + 'px'; }

document.getElementById('en-plus') .onclick = () => setEnSize(enFs + 2);
document.getElementById('en-minus').onclick = () => setEnSize(enFs - 2);
document.getElementById('ar-plus') .onclick = () => setArSize(arFs + 2);
document.getElementById('ar-minus').onclick = () => setArSize(arFs - 2);

// Native image upload pipeline
const fileInput   = document.getElementById('file-input');
const preview     = document.getElementById('product-preview');
const uploadLabel = document.getElementById('upload-label');
const imageInner  = document.getElementById('image-inner');
const imgSizeCtrl = document.getElementById('img-size-controls');
const imgSizeVal  = document.getElementById('img-size-val');
const imgResizeHdl= document.getElementById('img-resize-handle');
let imgScale = 100;

function setImgScale(s) {
  imgScale = Math.max(20, Math.min(200, s));
  preview.style.width  = imgScale + '%';
  preview.style.height = imgScale + '%';
  imgSizeVal.textContent = imgScale + '%';
}

fileInput.addEventListener('change', function () {
  const file = this.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display  = 'block';
    uploadLabel.style.display = 'none';
    imgSizeCtrl.classList.add('visible');
    imgResizeHdl.style.display = 'block';
    setImgScale(100);
  };
  reader.readAsDataURL(file);
});

preview.addEventListener('click', () => fileInput.click());
document.getElementById('img-plus') .onclick = () => setImgScale(imgScale + 10);
document.getElementById('img-minus').onclick = () => setImgScale(imgScale - 10);

// Container Canvas Layout Resizer API logic (Mouse & Touch compatible)
let isResizing = false, rsX, rsY, rsW, rsH;
imgResizeHdl.addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  isResizing = true; rsX = e.clientX; rsY = e.clientY;
  rsW = imageInner.offsetWidth; rsH = imageInner.offsetHeight;
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  imageInner.style.width  = Math.max(150, rsW + e.clientX - rsX) + 'px';
  imageInner.style.height = Math.max(120, rsH + e.clientY - rsY) + 'px';
});

document.addEventListener('mouseup', () => { isResizing = false; });

imgResizeHdl.addEventListener('touchstart', e => {
  e.preventDefault(); isResizing = true;
  rsX = e.touches[0].clientX; rsY = e.touches[0].clientY;
  rsW = imageInner.offsetWidth; rsH = imageInner.offsetHeight;
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (!isResizing) return;
  imageInner.style.width  = Math.max(150, rsW + e.touches[0].clientX - rsX) + 'px';
  imageInner.style.height = Math.max(120, rsH + e.touches[0].clientY - rsY) + 'px';
});

document.addEventListener('touchend', () => { isResizing = false; });
</script>
</body>
</html>
