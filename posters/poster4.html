<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster 4 – Green Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<style>
:root{--black:#121826;--green:#4AB37E;--price-bg:#F9FAFB}
body{background:#E2E8F0;font-family:'DM Sans',sans-serif}
.poster{background:#F4F7F6}

.top-section{height:50%;padding:12mm 18mm 5mm;display:flex;flex-direction:column;background:linear-gradient(180deg,#fff,#F4F7F6)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.brand-name{font-weight:900;font-size:48px;text-transform:uppercase;color:var(--green)}
.brand-name .deal{color:red}
.logo-img{width:180px;height:100px;object-fit:contain}

.img-card{flex-grow:1;background:#fff;border-radius:30px;display:flex;justify-content:center;align-items:center;
  cursor:pointer;border:2px dashed #ddd;overflow:hidden;position:relative}
.img-card .upload-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.item-img{max-width:90%;max-height:90%;object-fit:contain}

.bottom-section{height:50%;padding:10mm 15mm 15mm;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative}
.name-en{font-size:70px;font-weight:900;line-height:1.1;color:var(--black)}
.name-ar{font-size:65px;font-weight:700;color:var(--black);direction:rtl}

.price-grid{background:var(--price-bg);border-radius:30px;padding:20px 40px;display:flex;
  justify-content:space-around;align-items:center;border:2px solid #f5e726;
  width:90%;max-width:650px;position:absolute;bottom:25mm;left:50%;transform:translateX(-50%)}
.price-col{display:flex;flex-direction:column;align-items:center}
.label{font-size:20px;color:#8892B0;font-weight:600;margin-bottom:5px;text-transform:uppercase}
.val{font-size:85px;font-weight:900;color:var(--black);line-height:1;display:flex;align-items:baseline;white-space:nowrap}
.currency{font-size:32px;color:#858181;font-weight:600;margin:0 10px}
.v-divider{width:2px;height:80px;background:#E2E8F0}
</style>
</head>
<body>
<div class="poster">
  <div class="top-section">
    <div class="header">
      <div class="brand-name" contenteditable="true">FRESH <span class="deal">DEAL</span></div>
      <img src="../assets/logo.png" class="logo-img" alt="Logo">
    </div>
    <div class="img-card" id="imgCard">
      <label class="upload-btn" for="fileInput">Click to Upload Image</label>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <img id="productImg" src="" class="item-img" alt="">
    </div>
  </div>

  <div class="bottom-section">
    <div class="name-en" id="p4-en" contenteditable="true">ITEM NAME</div>
    <div class="name-ar" id="p4-ar" contenteditable="true">اسم المنتج</div>
    <div class="price-grid">
      <div class="price-col">
        <div class="label" contenteditable="true">Price</div>
        <div class="val"><span class="currency">KD</span><span id="engPrice" contenteditable="true">0.000</span></div>
      </div>
      <div class="v-divider"></div>
      <div class="price-col">
        <div class="label" contenteditable="true">السعر</div>
        <div class="val"><span class="currency">د.ك</span><span id="araPrice">٠.٠٠٠</span></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/navbar.js"></script>
<script>
bindPriceSync('engPrice','araPrice');
bindAutoTranslate('p4-en','p4-ar');

const fileInput=document.getElementById('fileInput'),productImg=document.getElementById('productImg'),ul=document.querySelector('#imgCard .upload-btn');
fileInput.addEventListener('change',()=>{if(fileInput.files[0]){productImg.src=URL.createObjectURL(fileInput.files[0]);ul.style.display='none';}});
</script>
</body>
</html>
