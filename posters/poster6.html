<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster 6 – Multi-Item Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#111111">
<style>
:root{--navy:#1d3557;--red:#e63946;--yellow:#ffb703;--light:#f4f6f8;--muted:#777}
body.theme-green{--navy:#1b4332;--red:#2d6a4f;--yellow:#95d5b2}
body.theme-dark{--navy:#000;--red:#d4af37;--yellow:#cfb53b}
body.theme-red{--navy:#780000;--red:#c1121f;--yellow:#fdf0d5}
body{font-family:'Plus Jakarta Sans',sans-serif}

html,body{margin:0;padding:0}
@page{size:A4;margin:0}
.a4-page{
  width:210mm;height:297mm;max-width:210mm;max-height:297mm;
  margin:0 auto;padding:10mm;overflow:hidden;box-sizing:border-box;
  display:flex;flex-direction:column;
}
header{background:var(--navy);color:#fff;padding:10px 18px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4mm}
header h1{margin:0;font-size:clamp(1.4rem,2vw,2rem);font-weight:800}
header img{height:50px;object-fit:contain;margin-right:15px}
.weekend-blitz{background:var(--red);padding:6px 12px;border-radius:8px;font-weight:700;font-size:.85rem;text-align:center}

.controls{display:flex;justify-content:flex-end;margin-bottom:4mm;gap:6px}
.controls button{padding:6px 10px;cursor:pointer;border-radius:5px;border:1px solid #ddd}

.items-grid{flex:1;min-height:0;display:grid;gap:4mm}
/* dynamic layout rules based on item count */
.items-grid.layout-1{grid-template-columns:1fr;grid-template-rows:1fr}
.items-grid.layout-2{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
.items-grid.layout-3{grid-template-columns:1fr;grid-template-rows:repeat(3,1fr)}
.items-grid.layout-4plus{grid-template-columns:repeat(2,1fr);grid-auto-rows:1fr}

.item-card{background:#fff;border-radius:12px;padding:6px;display:flex;flex-direction:column;border:1px solid #eee;min-height:0;position:relative}
.remove-btn{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;z-index:2}

.image-container{flex:1;min-height:0;border-radius:10px;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative}
.item-image{width:100%;height:100%;object-fit:contain;display:block}
.upload-btn{position:absolute;bottom:6px;right:6px;font-size:9px;padding:2px 6px}

.item-info{text-align:center;margin-top:4px}
.item-title{font-size:1rem;font-weight:800;color:var(--navy);margin:2px 0;text-transform:uppercase;letter-spacing:.3px;line-height:1.15}
.item-subtitle{font-family:'Tajawal',sans-serif;direction:rtl;unicode-bidi:plain-text;font-size:.78rem;font-weight:500;color:var(--muted);transition:opacity .2s}
.item-subtitle.translating{opacity:.4}
.price-section{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:6px}
.price-main{font-size:1.3rem;font-weight:800;color:#fff;background:var(--red);padding:.15em .65em;border-radius:8px;letter-spacing:-.2px;line-height:1.3}
.old-price{font-size:.78rem;font-weight:600;color:#9a9a9a;text-decoration:line-through;letter-spacing:.2px}

/* single item: full-page hero poster */
.layout-1 .item-card{padding:24px}
.layout-1 .image-container{border-radius:18px}
.layout-1 .item-info{margin-top:14px}
.layout-1 .item-title{font-size:clamp(2rem,4.5vw,3.2rem);margin:6px 0}
.layout-1 .item-subtitle{font-size:clamp(1rem,2vw,1.4rem)}
.layout-1 .price-section{justify-content:center;margin-top:10px}
.layout-1 .price-main{font-size:clamp(2.2rem,5.5vw,4rem)}
.layout-1 .old-price{display:none}

/* two items: stacked 50/50 rows */
.layout-2 .item-title{font-size:1.6rem}
.layout-2 .item-subtitle{font-size:1rem}
.layout-2 .price-section{justify-content:center}
.layout-2 .price-main{font-size:2rem}
.layout-2 .old-price{display:none}

/* three items: 3 stacked rows, full width each, fits one A4 page */
.layout-3 .item-card{flex-direction:row;align-items:center;gap:10px;padding:8px 10px}
.layout-3 .image-container{flex:0 0 36%;height:100%;align-self:stretch}
.layout-3 .item-info{flex:1;margin-top:0;text-align:left}
.layout-3 .price-section{flex-direction:row;align-items:baseline;justify-content:flex-start;gap:8px}
.layout-3 .item-title{font-size:clamp(1rem,2vw,1.3rem);margin:0 0 2px}
.layout-3 .item-subtitle{font-size:clamp(.7rem,1.2vw,.85rem)}
.layout-3 .price-main{font-size:clamp(1.2rem,2.5vw,1.6rem)}
.layout-3 .old-price{font-size:clamp(.75rem,1.2vw,.9rem)}

footer{background:var(--yellow);border-radius:12px;padding:6px;margin-top:4mm;text-align:center}
.footer-tagline{margin:0;font-size:1.2rem;font-weight:900}
[contenteditable]:focus{outline:2px dashed var(--yellow);background:rgba(255,183,3,.1)}

@media print{
  html,body{width:210mm;height:297mm}
  .controls,.upload-btn,.remove-btn{display:none !important}
  .a4-page{
    width:210mm;height:297mm;margin:0;padding:10mm;
    box-shadow:none;overflow:hidden;
    page-break-after:avoid;page-break-inside:avoid;break-inside:avoid;
  }
  * {-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
}
</style>
</head>
<body>
<div class="a4-page">
  <header>
    <img src="../assets/logo.png" alt="Logo">
    <h1 contenteditable="true">SUPER DEALS</h1>
    <div class="weekend-blitz" contenteditable="true">LOWEST<br>PRICES</div>
  </header>
  <div class="controls"><button onclick="addItem()">➕ Add Item</button></div>
  <div class="items-grid" id="itemsGrid"></div>
  <footer>
    <h3 class="footer-tagline" contenteditable="true">SHOP SMART • SAVE BIG</h3>
    <div contenteditable="true">OFFER VALID UNTIL:</div>
  </footer>
</div>

<template id="itemTemplate">
  <div class="item-card">
    <button class="remove-btn" onclick="removeItem(this)">✕</button>
    <div class="image-container">
      <img class="item-image" src="" alt="">
      <button class="upload-btn">CHANGE</button>
      <input type="file" accept="image/*" hidden>
    </div>
    <div class="item-info">
      <h2 class="item-title" contenteditable="true">Item Name</h2>
      <p class="item-subtitle" contenteditable="true">عربي</p>
      <div class="price-section">
        <div class="price-main" contenteditable="true">KD 0.000</div>
        <div class="old-price" contenteditable="true">KD 0.000</div>
      </div>
    </div>
  </div>
</template>

<script src="../js/shared.js"></script>
<script src="../js/navbar.js"></script>
<script>
async function translateToArabic(text) {
  if (!text) return '';
  return new Promise(resolve => {
    fetchTranslation(text, 'ar', (err, result) => resolve(err ? '' : (result || '')));
  });
}

async function translateCard(card){
  const titleEl=card.querySelector('.item-title');
  const subEl=card.querySelector('.item-subtitle');
  const source=(titleEl.innerText||'').trim();
  if(!source || source===card.dataset.lastTranslatedSource) return;
  subEl.classList.add('translating');
  const arabic=await translateToArabic(source);
  subEl.classList.remove('translating');
  if(arabic){
    subEl.innerText=arabic;
    card.dataset.lastTranslatedSource=source;
  }
}

function attachAutoTranslate(card){
  const titleEl=card.querySelector('.item-title');
  let debounceTimer;
  const schedule=()=>{
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(()=>translateCard(card),700);
  };
  titleEl.addEventListener('input',schedule);
  titleEl.addEventListener('blur',()=>{clearTimeout(debounceTimer);translateCard(card);});
}

function updateGridLayout(){
  const grid=document.getElementById('itemsGrid');
  const count=grid.children.length;
  grid.classList.remove('layout-1','layout-2','layout-3','layout-4plus');
  if(count<=1) grid.classList.add('layout-1');
  else if(count===2) grid.classList.add('layout-2');
  else if(count===3) grid.classList.add('layout-3');
  else grid.classList.add('layout-4plus');
  // enforce 1-item minimum: hide remove button when it's the only item left
  grid.querySelectorAll('.remove-btn').forEach(btn=>{
    btn.style.display = count<=1 ? 'none' : '';
  });
}

function removeItem(btn){
  const grid=document.getElementById('itemsGrid');
  if(grid.children.length<=1) return; // minimum 1 item enforced
  btn.closest('.item-card').remove();
  updateGridLayout();
}

function addItem(){
  const card=document.getElementById('itemTemplate').content.cloneNode(true);
  document.getElementById('itemsGrid').appendChild(card);
  const last=document.getElementById('itemsGrid').lastElementChild;
  const img=last.querySelector('.item-image'),inp=last.querySelector('input[type=file]'),btn=last.querySelector('.upload-btn');
  btn.onclick=()=>inp.click();
  inp.onchange=()=>{if(inp.files[0]){img.src=URL.createObjectURL(inp.files[0]);btn.style.display='none';}};
  attachAutoTranslate(last);
  updateGridLayout();
}
addItem();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js").catch(()=>{});</script>
</body>
</html>
