<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 Price Poster – Auto-Sync Background Edition</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#111111">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── A4 portrait = 210mm × 297mm ── */
@page { size: 210mm 297mm portrait; margin: 0; }

:root {
  --bg-main:       #f8fafc;
  --card-bg:       #ffffff;
  --grad-start:    #000000; 
  --grad-end:      #fd6a00; 
  --tag-dark:      #36454F; 
  --text-dark:     #36454F; 
  --text-muted:    #475569;
  --light-gray:    #f1f5f9;
  --border-color:  #cbd5e1;

  --card-w: 147mm;
  --card-h: 68.5mm;   
  --gap-h: 5mm;
}

body {
  margin: 0;
  background: var(--bg-main);
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--text-dark);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.file-input-hidden {
  display: none !important;
}

/* ══════════════════ SCREEN CONTROLS ══════════════════ */
.controls {
  width: var(--card-w);
  margin: 0 0 16px 0;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 4mm;
}

.ctrl-group { display: flex; gap: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: none;
  border-radius: 20px;
  padding: 10px 22px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  color: #ffffff;
  cursor: pointer;
  transition: transform .2s ease, box-shadow .2s ease;
  box-shadow: 0 4px 10px rgba(239, 68, 68, 0.25);
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(239, 68, 68, 0.35); }
.btn:active { transform: scale(.97); }

.btn-remove {
  position: absolute;
  top: 2mm; right: 2mm;
  width: 7mm; height: 7mm;
  border-radius: 50%;
  background: var(--tag-dark);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.2);
  font-size: 9pt;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  transition: all .15s;
}
.btn-remove:hover { background: var(--grad-start); transform: scale(1.1); }

/* ══════════════════ PAGE / CARDS WRAPPER ══════════════════ */
.page {
  width: var(--card-w);
  display: flex;
  flex-direction: column;
  gap: 0;
  background: transparent;
}

/* ══════════════════ SINGLE CARD WRAPPER ══════════════════ */
.card-container {
  display: flex;
  flex-direction: column;
  margin-bottom: var(--gap-h);
  position: relative;
}

.cut-label {
  position: absolute;
  bottom: calc(-1 * var(--gap-h));
  left: 0;
  width: 100%;
  height: var(--gap-h);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8pt;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 4px;
  pointer-events: none;
  user-select: none;
}
.cut-label::before, .cut-label::after {
  content: '';
  flex: 1;
  border-bottom: 2px dotted var(--border-color);
  margin: 0 15px;
}

.card-container:nth-child(4n),
.card-container:last-child {
  margin-bottom: 0;
}
.card-container:nth-child(4n) .cut-label,
.card-container:last-child .cut-label {
  display: none !important;
}

.card {
  width: var(--card-w);
  height: var(--card-h);
  position: relative;
  background: var(--card-bg);
  background-size: cover;
  background-position: center;
  border: 1.5mm solid var(--tag-dark);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
}

/* Contrast optimization layer when background image is assigned */
.card.has-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.65);
  z-index: 1;
  pointer-events: none;
}

/* ── HEADER BAR ── */
.top-bar {
  position: relative;
  z-index: 2;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6mm;
  height: 14mm;
  flex-shrink: 0;
  border-bottom: 1mm solid var(--tag-dark);
}

.brand-logo {
  height: 9mm;
  max-width: 55mm;
  width: auto;
  object-fit: contain;
  display: block;
}
.brand-mark {
  display: flex;
  align-items: baseline;
  gap: 1mm;
}
.brand-mark .m1 { font-size: 20pt; font-weight: 900; color: #ffffff; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1; }
.brand-mark .m2 { font-size: 20pt; font-weight: 500; color: var(--tag-dark); letter-spacing: 0.5px; text-transform: uppercase; line-height: 1; }

.brand-tag {
  font-size: 8pt;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: rgba(15, 23, 42, 0.25);
  padding: 4px 10px;
  border-radius: 4px;
  line-height: 1;
}

/* ── CONTENT BODY ── */
.card-body {
  position: relative;
  z-index: 2;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 52mm;
  min-height: 0;
}

.left {
  padding: 4mm 5mm;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0; /* Ensures inner flex layouts can calculate correct boundary widths */
}

/* Container wrapper added to isolate naming dimensions safely */
.names-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
}

.name-en {
  font-size: 18pt;
  font-weight: 900;
  color: var(--text-dark);
  text-transform: uppercase;
  letter-spacing: 0.2px;
  line-height: 1.05;
  outline: none;
  white-space: nowrap;
  overflow: hidden;
}
.name-en:focus { border-bottom: 2px solid var(--grad-start); }
.name-en:empty::before { content: attr(data-ph); color: #cbd5e1; font-weight: 600; }

.name-sep {
  display: flex;
  align-items: center;
  margin: 1.5mm 0;
}
.name-sep .line {
  flex: 1;
  height: 3px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end), transparent);
  border-radius: 2px;
}

.name-ar {
  font-family: 'Cairo', sans-serif;
  font-size: 15pt;
  font-weight: 900;
  color: var(--text-dark);
  line-height: 1.2;
  direction: rtl;
  outline: none;
  white-space: nowrap;
  overflow: hidden;
}
.name-ar:focus { border-bottom: 2px solid var(--grad-start); }
.name-ar:empty::before { content: attr(data-ph); color: #cbd5e1; font-weight: 800; direction: rtl; }

.translate-status { font-size: 6.5pt; color: var(--text-muted); min-height: 10px; margin-top: 0.5mm; font-weight: 700; text-transform: uppercase; }

.price-box {
  background: var(--tag-dark);
  border-radius: 8px;
  padding: 4mm 4mm 2mm 4mm;
  width: fit-content;
  min-width: 48mm;
  position: relative;
  margin-top: auto;
  box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
}
.price-box::after {
  content: 'SUPER VALUE';
  position: absolute;
  top: -2.5mm; left: 3mm;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
  color: #ffffff;
  font-size: 6pt;
  font-weight: 900;
  padding: .5mm 2.5mm;
  border-radius: 4px;
  letter-spacing: 0.8px;
}

.price-row {
  display: flex;
  align-items: flex-end;
  gap: 1.5mm;
  line-height: 1;
}
.price-num {
  font-size: 38pt;
  font-weight: 900;
  color: #000000;
  line-height: 0.75;
  letter-spacing: -1px;
  outline: none;
  background: linear-gradient(135deg, #ffffff, #e2e8f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.price-num:focus { outline: 2px dashed var(--grad-end); }
.price-cur {
  font-size: 15pt;
  font-weight: 900;
  color: var(--grad-end);
  padding-bottom: 0.5mm;
}
.price-unit {
  font-size: 7.5pt;
  color: #94a3b8;
  font-weight: 700;
  text-transform: uppercase;
  margin-top: 2mm;
  padding-top: 1.5mm;
  border-top: 1px solid #334155;
  font-family: 'Cairo', sans-serif;
  outline: none;
}

/* Suppress base.css [contenteditable]:hover highlight on all price fields */
.price-unit:hover:not(:focus),
.price-box [contenteditable]:hover:not(:focus) {
  background: transparent !important;
  border-radius: 0 !important;
}
.price-num:hover:not(:focus) {
  background: linear-gradient(135deg, #ffffff, #e2e8f0) !important;
  -webkit-background-clip: text !important;
  background-clip: text !important;
}

/* ── RIGHT IMAGE SECTION ── */
.right {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 3mm;
  overflow: hidden;
  background: transparent;
}

.img-area {
  position: relative;
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 6px;
  border: 2px dashed var(--border-color);
  overflow: hidden;
  
  transition: all 0.2s;
}
.img-area:hover { border-color: var(--grad-start); background: #f8fafc; }
.img-area:hover .img-area-overlay { opacity: 1; }
.img-area:hover .product-img { opacity: .15; }

.product-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  z-index: 2;
}

.img-area-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .15s;
  z-index: 3;
}
.img-area-label {
  font-size: 6.5pt;
  font-weight: 800;
  text-transform: uppercase;
  color: #ffffff;
  background: var(--tag-dark);
  padding: 1.5mm 3mm;
  border-radius: 20px;
}
.img-remove-btn {
  position: absolute;
  top: 1.5mm; right: 1.5mm;
  width: 5mm; height: 5mm;
  border-radius: 50%;
  background: var(--grad-start);
  color: white; border: none;
  font-size: 7pt; font-weight: bold; display: flex; align-items: center; justify-content: center;
  opacity: 0; z-index: 10; cursor: pointer; transition: all 0.15s;
}
.img-area:hover .img-remove-btn { opacity: 1; }

.country-select {
  font-size: 7.5pt;
  font-family: inherit;
  font-weight: 700;
  color: var(--text-dark);
  padding: 4px 6px;
  border: 1.5px solid var(--border-color);
  border-radius: 6px;
  margin-bottom: 3px;
  max-width: 95%;
  width: 100%;
  z-index: 10;
  background: #fff;
  cursor: pointer;
}

.made-in-badge {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2mm 1.5mm;
  background: var(--light-gray);
  border-radius: 6px;
  border: 1.5px solid var(--tag-dark);
  margin-top: 1.5mm;
  flex-shrink: 0;
}
.made-in-flags { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 1.5mm; }
.made-in-text-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
.made-in-en { font-size: 7pt; font-weight: 800; text-transform: uppercase; color: var(--tag-dark); line-height: 1.1; }
.made-in-ar { font-family: 'Cairo', sans-serif; font-size: 7.5pt; font-weight: 900; color: var(--tag-dark); line-height: 1.1; direction: rtl; }
.badge-flag {
  width: 6mm; height: 4mm;
  border: .2mm solid rgba(0,0,0,0.15);
  background-size: cover; background-position: center;
  flex-shrink: 0;
}

/* ── BACKGROUND ACTION BUTTON OVERRIDES ── */
.bg-controls-group {
  position: absolute;
  top: 1.5mm; left: 1.5mm;
  display: flex;
  gap: 3px;
  z-index: 50;
}
.bg-upload-btn, .bg-remove-btn {
  display: inline-flex;
  align-items: center;
  background: var(--card-bg);
  color: var(--text-dark);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 6pt; font-weight: 800;
  cursor: pointer;
  transition: all 0.15s ease;
}
.bg-upload-btn:hover, .bg-remove-btn:hover {
  border-color: var(--tag-dark);
  background: var(--light-gray);
}

/* ══════════════════ PRINT OPTIMIZATIONS ══════════════════ */
@media print {

  @page {
    size: A4 portrait;
    margin: 0;
  }

  html,
  body {
    width: 210mm !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #fff !important;
  }

  body {
    display: block !important;
  }

  .controls {
    display: none !important;
  }

  /* FULL PAGE WIDTH */
  .page {
    width: 210mm !important;
    margin: 0 !important;
    padding: 0 !important;
    padding-left: 2mm !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: flex-start !important;
  }

  /* LEFT ALIGN CARDS */
  .card-container {
    width: auto !important;
    margin-left: 0 !important;
    margin-right: auto !important;
    page-break-inside: avoid;
    break-inside: avoid;
  }

  .card {
    width: var(--card-w) !important; /* 147mm */
    margin-left: 0 !important;
    margin-right: auto !important;
    box-shadow: none !important;
    border: 1.5mm solid var(--tag-dark) !important;
    background-color: #fff !important;
  }

  .btn-remove,
  .img-area-overlay,
  .img-remove-btn,
  .translate-status,
  .country-select,
  .bg-controls-group {
    display: none !important;
  }

  .img-area {
    border: none !important;
    background: none !important;
  }

  .top-bar {
    background: linear-gradient(
      90deg,
      var(--grad-start),
      var(--grad-end)
    ) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .price-box {
    background: var(--tag-dark) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .price-num {
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
  }

}
</style>
</head>

// Dynamic Text Scaling Function to guarantee content limits inside the bounds 
function autoFitText(element, defaultSizePt) {
  if (!element) return;
  
  // Set to default original size first to recalculate clean metrics on typing reduction
  element.style.fontSize = defaultSizePt + 'pt';
  
  let currentSize = defaultSizePt;
  const maxWidth = element.parentElement.clientWidth || 250; 

  // Reduce text sizes step by step if it pushes out layout scroll dimensions
  while (element.scrollWidth > maxWidth && currentSize > 8) {
    currentSize -= 0.5;
    element.style.fontSize = currentSize + 'pt';
  }
}


function handleTranslationTyping(n) {
  // Calls shared.js handleTranslationTyping with autoFit hooks specific to this poster
  _sharedHandleTranslationTyping(n, {
    onEnInput: el => autoFitText(el, 18),
    onArResult: el => autoFitText(el, 15)
  });
}

function createCard(defaultCountry = countriesData[0]) {
  cardCounter++;
  const n = cardCounter;
  const { flag, en, ar, code } = defaultCountry;

  const container = document.createElement('div');
  container.className = 'card-container';
  container.id = `container${n}`;
  
  let pickerOptions = countriesData.map(c => 
    `<option value="${c.code}" ${c.code === code ? 'selected' : ''}>${c.en} / ${c.ar}</option>`
  ).join('');

  container.innerHTML = `
    <div class="card" id="card${n}">
      <button class="btn-remove no-print" onclick="removeCard(${n})" title="Remove this item">✕</button>

      <div class="top-bar">
        <img src="../assets/logo.png" alt="Logo" class="brand-logo"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="brand-mark" style="display:none;">
          <span class="m1">MANGO</span><span class="m2">HYPER</span>
        </div>
        <span class="brand-tag">Mega Savings</span>
      </div>

      <div class="card-body">
        <div class="left">
          <div class="names-wrap">
            <div class="name-en" id="nameEn${n}" contenteditable="true" data-ph="ITEM NAME" spellcheck="false" oninput="handleTranslationTyping(${n})"></div>
            <div class="name-sep">
              <div class="line"></div>
            </div>
            <div class="name-ar" id="nameAr${n}" contenteditable="true" data-ph="اسم المنتج" spellcheck="false" oninput="autoFitText(this, 15)"></div>
            <div class="translate-status" id="ts${n}"></div>
          </div>
          <div class="price-box">
            <div class="price-row">
              <div class="price-num" contenteditable="true" spellcheck="false">0.000</div>
              <div class="price-cur">KD</div>
            </div>
            <div class="price-unit" contenteditable="true" spellcheck="false">/ KG &nbsp;|&nbsp; لكل كيلو</div>
          </div>
        </div>

        <div class="right" id="right${n}">
          <div class="img-area" onclick="document.getElementById('fileProduct${n}').click()">
            <img id="productImg${n}" class="product-img" src="" alt="">
            <div class="img-area-overlay">
              <span class="img-area-label">Pick Photo</span>
            </div>
            <button class="img-remove-btn" onclick="event.stopPropagation();clearAllImages(${n})">✕</button>
           
            <input type="file" id="fileProduct${n}" class="file-input-hidden" accept="image/*" onchange="loadSyncImages(this, ${n})">
          </div>

          <select class="country-select" onchange="updateCountry(this, ${n})">
            ${pickerOptions}
          </select>

          <div class="made-in-badge" id="madeInBadge${n}">
            <div class="made-in-flags">
              <span class="badge-flag" id="badgeFlag${n}L" style="background-image:url('${flag}')"></span>
              <div class="made-in-text-wrap">
                <span class="made-in-en" id="madeInEn${n}">Made in ${en}</span>
                <span class="made-in-ar" id="madeInAr${n}">صنع في ${ar}</span>
              </div>
              <span class="badge-flag" id="badgeFlag${n}R" style="background-image:url('${flag}')"></span>
            </div>
          </div>

          <div class="bg-controls-group">
            <label class="bg-upload-btn">
              BG <input type="file" class="file-input-hidden" accept="image/*" onchange="loadBg(this,'card${n}')">
            </label>
            <button class="bg-remove-btn" onclick="clearBg('card${n}')">✕ BG</button>
          </div>
        </div>
      </div>
    </div>
    <div class="cut-label">✂ ─── DETACH HERE ───</div>
  `;
  return container;
}




function loadSyncImages(input, n) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const dataUrl = ev.target.result;
    document.getElementById(`productImg${n}`).src = dataUrl;
    const cardEl = document.getElementById(`card${n}`);
    cardEl.style.backgroundImage = `url('${dataUrl}')`;
    cardEl.classList.add('has-bg');
  };
  r.readAsDataURL(f);
}

function clearAllImages(n) {
  document.getElementById(`productImg${n}`).src = '';
  clearBg(`card${n}`);
}


document.addEventListener('DOMContentLoaded', () => {
  addCard(countriesData[0]);
});
