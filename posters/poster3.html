<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster 3 – Fresh Deal | Mango Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<style>
:root{--primary:#990342;--teal:#2e7a7d;--yellow:#FFD600}
body{font-family:'DM Sans',sans-serif}

.header{height:160px;background:var(--primary);display:flex;align-items:center;
  clip-path:polygon(0 0,100% 0,100% 85%,0 100%);flex-shrink:0;position:relative}
.header-text{color:#fff;padding-left:50px;font-size:70px;font-weight:900;
  font-style:italic;line-height:.8;text-shadow:4px 4px 0 #c1121f}
.logo-box{position:absolute;right:30px;top:15px;background:#fff;padding:8px 16px;border-radius:8px}
.logo-box img{height:80px;object-fit:contain}

.main-content{flex:1;padding:10px 40px;display:flex;flex-direction:column;align-items:center}

.image-container{width:100%;height:320px;display:flex;align-items:center;justify-content:center;
  border:2px dashed #ccc;border-radius:30px;margin-bottom:15px;background:#fafafa;
  position:relative;overflow:hidden;cursor:pointer}
.image-container img{width:100%;height:100%;object-fit:contain}
.image-container .upload-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}

.product-info{width:100%;text-align:center}
.product-title{font-size:60px;font-weight:850;color:#212121;text-transform:uppercase;
  line-height:1;max-height:120px;overflow:hidden}
.product-title-ar{font-size:40px;font-weight:600;direction:rtl;margin-bottom:10px;color:#444}

.price-container{margin-top:5px;display:flex;flex-direction:column;align-items:center;
  background:#fff;padding:30px 10px;border-radius:35px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);width:95%;margin-left:auto;margin-right:auto}
.price-row{display:flex;align-items:center;justify-content:center;gap:20px}
.price-main{font-size:200px;font-weight:900;line-height:.75;color:#000;letter-spacing:-5px}
.price-ar-row .price-main{font-size:120px;letter-spacing:0}
.currency{font-size:55px;font-weight:900;color:#333}

.footer{height:90px;background:var(--teal);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:26px;font-weight:bold;
  clip-path:polygon(0 25%,100% 0,100% 100%,0 100%);flex-shrink:0}
</style>
</head>
<body>
<div class="a4-page">
  <header class="header">
    <div class="header-text">FRESH<br>DEAL</div>
    <div class="logo-box"><img src="../assets/logo.png" alt="Logo"></div>
  </header>

  <main class="main-content">
    <div class="image-container" id="imgContainer">
      <label id="uploadBtn" for="fileInput" class="upload-btn">Upload Image</label>
      <input type="file" id="fileInput" accept="image/*" hidden>
      <img id="previewImage" alt="">
    </div>
    <div class="product-info">
      <div class="product-title" id="p2-en" contenteditable="true">PRODUCT NAME</div>
      <div class="product-title-ar" id="p2-ar" contenteditable="true">اسم المنتج</div>
      <div class="price-container">
        <div class="price-row price-ar-row">
          <div class="price-main" id="ar-price">٠</div>
          <div class="currency" contenteditable="true">د.ك</div>
        </div>
        <div class="price-row">
          <div class="currency" contenteditable="true">KD</div>
          <div class="price-main" id="en-price" contenteditable="true">0</div>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer" contenteditable="true">OFFER VALID UNTIL:</footer>
</div>

<script src="../js/shared.js"></script>
<script src="../js/navbar.js"></script>
<script>
bindPriceSync('en-price', 'ar-price');
bindAutoTranslate('p2-en', 'p2-ar');

const fileInput = document.getElementById('fileInput');
const preview   = document.getElementById('previewImage');
const btn       = document.getElementById('uploadBtn');
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) { preview.src = URL.createObjectURL(fileInput.files[0]); btn.style.display = 'none'; }
});

const enTitle = document.getElementById('p2-en');
enTitle.addEventListener('input', () => autoShrink(enTitle, 60, 20));
window.addEventListener('load', () => autoShrink(enTitle, 60, 20));
</script>
</body>
</html>
