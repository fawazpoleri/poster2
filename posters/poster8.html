<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotfood Poster - Fixed Version</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@400;600;700;800;900&family=Noto+Kufi+Arabic:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ececec;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    font-family:'Barlow Condensed',sans-serif;
}

.poster-canvas{
    width:794px;
    height:1123px;
    background:#fffaf5;
    position:relative;
    overflow:hidden;
}

/* Background */
.bg-texture{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top,#fff5e8 0%,transparent 55%),
        radial-gradient(circle at bottom left,#ffe5c2 0%,transparent 45%);
}

.top-arch{
    position:absolute;
    top:-160px;
    left:-80px;
    right:-80px;
    height:560px;
    background:#c0392b;
    border-radius:0 0 55% 55%;
}

.top-arch-inner{
    position:absolute;
    top:-120px;
    left:-40px;
    right:-40px;
    height:520px;
    background:#e8472a;
    border-radius:0 0 55% 55%;
}

.dot-ring{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:680px;
    height:300px;
    border-radius:0 0 50% 50%;
    border:2px dashed rgba(255,255,255,.15);
}

/* Hero */
.hero{
    position:relative;
    z-index:10;
    text-align:center;
    padding-top:40px;
}

.hero-logo{
    height:90px;
    width:auto;
    display:block;
    margin:0 auto 15px;
    
    cursor: pointer;
}

.hero-eyebrow{
    font-size:12px;
    letter-spacing:5px;
    color:rgba(255,255,255,.8);
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:10px;
}

.hero-title{
    font-family:'Playfair Display',serif;
    font-size:90px;
    line-height:.9;
    color:white;
    font-weight:900;
    text-shadow:0 8px 25px rgba(0,0,0,.25);
}

.hero-title em{
    color:#ffcc00;
    font-style:italic;
}

.hero-sub{
    margin-top:10px;
    color:rgba(255,255,255,.7);
    letter-spacing:5px;
    text-transform:uppercase;
}

/* Food Zone - Repositioned to fix card overlap */
.food-zone{
    position:absolute;
    top:290px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:430px;
    z-index:11;
}

.food-plate{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    height:420px;
    border-radius:50%;
    background:radial-gradient(circle,#fff8f0 0%,#f2dfca 65%,#dbb89a 100%);
    box-shadow:
        0 20px 60px rgba(0,0,0,.15),
        inset 0 -8px 15px rgba(0,0,0,.05);
}

.food-img{
    width:400px;
    height:400px;
    border-radius:50%;
    object-fit:cover;
    position:absolute;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.food-upload-btn{
    position:absolute;
    bottom:0px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    border:none;
    border-radius:100px;
    padding:10px 18px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.12);
    z-index: 15;
}

#foodUpload,
#logoUpload,
#footerLogoUpload {
    display:none;
}

/* Decorations */
.spice{
    position:absolute;
    z-index:12;
    font-size:35px;
}

.spice1{top:360px;left:70px;}
.spice2{top:350px;right:65px;}
.spice3{top:540px;left:55px;}
.spice4{top:540px;right:55px;}

/* Content Card */
.content-card{
    position:absolute;
    bottom:56px;
    left:0;
    right:0;
    height:440px;
    background:white;
    border-radius:45px 45px 0 0;
    box-shadow:0 -10px 40px rgba(0,0,0,.08);
    padding:90px 50px 40px;
    z-index:10;
}

.content-card::before{
    content:"";
    position:absolute;
    top:-80px;
    left:50%;
    transform:translateX(-50%);
    width:260px;
    height:160px;
    background:white;
    border-radius:140px 140px 0 0;
}

/* Names */
.item-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 5px;
}

.item-name-en{
    font-family:'Playfair Display',serif;
    font-size:48px;
    font-weight:900;
    color:#111;
}

.item-name-ar{
    font-family:'Noto Kufi Arabic',sans-serif;
    font-size:32px;
    font-weight:900;
    color:#c0392b;
    direction:rtl;
    text-align:right;
}

/* Divider */
.card-divider{
    height:2px;
    margin:20px 0;
    background:linear-gradient(90deg,#e8472a,#ffcc00,transparent);
}

/* Price Section */
.price-info-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-top:15px;
}

.price-block{
    min-width:200px;
}

.price-eyebrow{
    font-size:12px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:#999;
}

.price-main{
    display:flex;
    align-items:flex-end;
    gap:8px;
}

.price-currency{
    color:#e8472a;
    font-size:30px;
    font-weight:800;
    margin-bottom:8px;
}

.price-value{
    font-size:75px;
    line-height:1;
    font-family:'Playfair Display',serif;
    font-weight:900;
}

.price-each{
    color:#999;
    text-transform:uppercase;
    font-size:12px;
    margin-top:2px;
}

/* Pills restructured horizontally to prevent layout breakage */
.info-pills{
    display:flex;
    flex-direction:row;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap:10px;
    max-width: 440px;
}

.pill{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff8f2;
    border:1px solid #f0dcc8;
    border-radius:100px;
    padding:8px 14px;
}

.pill-text{
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    white-space: nowrap;
}

/* Footer */
.footer-strip{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:56px;
    background:#e8472a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    z-index:20;
}

.footer-contact{
    color:white;
    font-weight:700;
    font-size: 16px;
}

.footer-logo-wrap{
    cursor: pointer;
    display: flex;
    align-items: center;
}

.footer-logo{
    height:28px;
    filter:brightness(0) invert(1);
}

.footer-web{
    color:rgba(255,255,255,.8);
    letter-spacing:2px;
    text-transform:uppercase;
    font-size:13px;
}
</style>
</head>

<body>

<div class="poster-canvas">

    <div class="bg-texture"></div>
    <div class="top-arch"></div>
    <div class="top-arch-inner"></div>
    <div class="dot-ring"></div>

    <div class="spice spice1">🌿</div>
    <div class="spice spice2">🌶️</div>
    <div class="spice spice3">🍋</div>
    <div class="spice spice4">🧄</div>

    <div class="hero">
        


        <div class="hero-eyebrow" contenteditable="true">
            Today's Special
        </div>

        <div class="hero-title" contenteditable="true">
            Hot & <em>Fresh</em>
        </div>

       
    </div>

    <div class="food-zone">
        <div class="food-plate"></div>
        <img
            id="foodPreview"
            class="food-img"
            src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=800"
            alt="Food">

        <label class="food-upload-btn" for="foodUpload">
            📷 Upload Photo
        </label>
        <input type="file" id="foodUpload" accept="image/*">
    </div>

    <div class="content-card">
        <div class="item-row">
            <div>
                
                <div class="item-name-en" id="product-en" contenteditable="true">Grilled Chicken</div>
            </div>
                            
            <div class="item-name-ar" id="product-ar" contenteditable="true">دجاج مشوي</div>
            
        </div>
        

        <div class="card-divider"></div>

        <div class="price-info-row">
            <div class="price-block">
                <div class="price-eyebrow">
                    Special Price
                </div>
                <div class="price-main">
                    <span class="price-currency">KD</span>
                    <span class="price-value" contenteditable="true">2.500</span>
                </div>
                <div class="price-each" contenteditable="true">
                    Per Portion
                </div>
            </div>

            <div class="info-pills">
                <div class="pill">
                    <span>🔥</span>
                    <span class="pill-text" contenteditable="true">Fresh Daily</span>
                </div>
                <div class="pill">
                    <span>⭐</span>
                    <span class="pill-text" contenteditable="true">Chef Special</span>
                </div>
                <div class="pill">
                    <span>🥗</span>
                    <span class="pill-text" contenteditable="true">Premium Ingredients</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-strip">
      <img 
                id="footerLogoPreview" 
                class="footer-logo" 
                src="../assets/logo.png" 
                alt="Footer Logo">
        
   
       

        <div class="footer-web" contenteditable="true">
            www.mangohyper.com
        </div>
    </div>

</div>
<script src="../js/shared.js"></script>
<script src="../js/navbar.js"></script>

<script>
function bindUpload(inputId, targetIds){
    const input = document.getElementById(inputId);
    if (!input) return;

    input.addEventListener("change", function(){
        if(!this.files[0]) return;
        const url = URL.createObjectURL(this.files[0]);

        targetIds.forEach(id => {
            const img = document.getElementById(id);
            if(img) img.src = url;
        });
    });
}

// Fixed up accurate file listeners mapping cleanly to the preview image IDs
bindUpload("foodUpload", ["foodPreview"]);
bindUpload("logoUpload", ["logoPreview"]);
bindUpload("footerLogoUpload", ["footerLogoPreview"]);

/**
 * Auto-Translate Feature (EN to AR)
 * Leverages a lightweight API endpoint using debounce to run smoothly as the user types.
 */
const englishInput = document.getElementById('product-en');
const arabicOutput = document.getElementById('product-ar');
let translationTimeout;

if (englishInput && arabicOutput) {
    englishInput.addEventListener('input', () => {
        clearTimeout(translationTimeout);
        
        // Wait 700ms after the user stops typing to trigger the request (prevents spamming API calls)
        translationTimeout = setTimeout(() => {
            const textToTranslate = englishInput.innerText.trim();
            if (!textToTranslate) {
                arabicOutput.innerText = '';
                return;
            }
            
            const apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=${encodeURIComponent(textToTranslate)}`;
            
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data && data[0] && data[0][0] && data[0][0][0]) {
                        arabicOutput.innerText = data[0][0][0];
                    }
                })
                .catch(error => {
                    console.error("Translation failed:", error);
                });
        }, 700);
    });
}
</script>

</body>
</html>
