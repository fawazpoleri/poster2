<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster 7 – Hotfood 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#111111">
<style>
body{background:#f1f3f5;font-family:'Outfit',sans-serif}

.poster-canvas{width:794px;height:1123px;background:#fff;position:relative;overflow:hidden;
  box-shadow:0 15px 45px rgba(0,0,0,.1);display:flex;flex-direction:column;justify-content:space-between}

.header-bg-shape{position:absolute;top:-120px;left:-50px;width:900px;height:380px;
  background:linear-gradient(135deg,#2e7d32,#1b5e20);border-radius:0 0 50% 50% / 0 0 30% 30%;z-index:10}

.header-wrap{position:relative;text-align:center;margin-top:50px;z-index:15;padding:0 40px}
.tagline{font-size:16px;text-transform:uppercase;letter-spacing:5px;color:#a5d6a7;margin:0 0 10px;font-weight:800}
.main-title{font-family:'Fredoka One',cursive;font-size:82px;color:#fff;margin:0 0 20px;line-height:1.1;text-shadow:0 4px 12px rgba(0,0,0,.15)}

.price-badge-container{position:absolute;top:260px;right:80px;z-index:25;transform:rotate(8deg)}
.price-badge{background:#ff3d00;color:#fff;padding:20px 30px;border-radius:18px;
  box-shadow:0 10px 25px rgba(255,61,0,.35);border:4px solid #fff;text-align:center}
.price-val{font-family:'Fredoka One',cursive;font-size:52px;line-height:1;display:block}
.price-label{font-size:14px;text-transform:uppercase;letter-spacing:2px;font-weight:800;margin-top:4px;display:block;color:#ffe0b2}

.graphic-display-frame{position:absolute;top:260px;bottom:104px;left:0;width:100%;z-index:1;overflow:hidden;background:#fff}
.display-asset{width:100%;height:100%;object-fit:cover;display:block}

.swap-asset-controller{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:30}
.trigger-widget-action{border:none;color:#fff;background:#ff9100;padding:14px 32px;border-radius:100px;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .2s,background .2s;white-space:nowrap}
.trigger-widget-action:hover{background:#ff6d00;transform:scale(1.05)}
.swap-asset-controller input[type="file"]{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer}

.footer-ribbon{background:#ffb300;width:100%;padding:30px 50px;box-sizing:border-box;
  display:flex;justify-content:space-between;align-items:center;z-index:20;position:relative}
.footer-text{font-size:15px;text-transform:uppercase;letter-spacing:2px;color:#5d4037;font-weight:800}
.footer-logo{position:absolute;bottom:12px;right:12px;width:80px;height:80px;object-fit:contain}

@media print{
  body{background:#fff;margin:0;padding:0}
  .poster-canvas{box-shadow:none;margin:0;width:210mm;height:297mm;position:absolute;top:0;left:0}
  .swap-asset-controller{display:none!important}
}
</style>
</head>
<body>
<div class="poster-canvas">
  <div class="header-bg-shape"></div>
  <div class="header-wrap">
    <h3 class="tagline" contenteditable="true">100% Fresh & Organic</h3>
    <h1 class="main-title" contenteditable="true">FRESH JUICE</h1>
  </div>

  <div class="price-badge-container">
    <div class="price-badge">
      <span class="price-val" contenteditable="true">KD.1</span>
      <span class="price-label" contenteditable="true">Per Glass</span>
    </div>
  </div>

  <div class="graphic-display-frame">
    <img id="display-img" class="display-asset" src="https://static.vecteezy.com/system/resources/previews/030/658/879/large_2x/juice-with-white-background-high-quality-ultra-hd-free-photo.jpg" alt="Fruit">
    <div class="swap-asset-controller">
      <button class="trigger-widget-action">🍎 Upload Photo</button>
      <input type="file" accept="image/*" onchange="swapImg(event)">
    </div>
  </div>

  <div class="footer-ribbon">
    <span class="footer-text" contenteditable="true">Eat Healthy Live Better</span>
    <img src="../assets/logo.png" alt="Logo" class="footer-logo">
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/navbar.js"></script>
<script>
function swapImg(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const img=document.getElementById('display-img');
  img.src=url;img.onload=()=>URL.revokeObjectURL(url);
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("../sw.js").catch(()=>{});</script>
</body>
</html>
