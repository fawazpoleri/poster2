<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── A4 portrait = 210mm × 297mm ── */
@page { size: 210mm 297mm portrait; margin: 0; }

:root {
  --bg-main:    #ffffff;
  --white:      #ffffff;
  --dark:       #111111;
  --mid:        #666666;
  --light-gray: #f8f9fa;
  --border:     #eaeaea;
  --border-dark:#222222;

  /* Constrain layout to 70% of full A4 width */
  --card-w: 147mm;
  
  /* Total stack calculated to fit cleanly within A4 max heights */
  --card-h: 68.5mm;   
  --gap-h: 5mm;
}

body {
  margin: 0;
  background: #f0f1f3;
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--dark);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* Helper to hide native inputs */
.file-input-hidden {
  display: none !important;
}

/* ══════════════════ SCREEN CONTROLS ══════════════════ */
.controls {
  width: var(--card-w);
  margin: 14px 0 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4mm;
}

.ctrl-group { display: flex; gap: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border: 1px solid var(--border-dark);
  border-radius: 4px;
  padding: 7px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  background: var(--dark);
  color: var(--white);
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { background: #333; }
.btn:active { transform: scale(.97); }

.btn-remove {
  position: absolute;
  top: 2mm; right: 2mm;
  width: 6mm; height: 6mm;
  border-radius: 50%;
  background: var(--dark);
  color: #fff;
  border: none;
  font-size: 8pt;
  font-weight: 400;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  transition: background .15s;
  box-shadow: 0 1mm 3mm rgba(0,0,0,.1);
}
.btn-remove:hover { background: #ff3b30; }

/* ══════════════════ PAGE / CARDS WRAPPER ══════════════════ */
.page {
  width: var(--card-w);
  margin: 10px 0 24px 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  background: transparent;
}

/* ══════════════════ SINGLE CARD CARD WRAPPER ══════════════════ */
.card-container {
  display: flex;
  flex-direction: column;
  margin-bottom: var(--gap-h);
  position: relative;
}

/* ── CUT LABEL LINE ── */
.cut-label {
  position: absolute;
  bottom: calc(-1 * var(--gap-h));
  left: 0;
  width: 100%;
  height: var(--gap-h);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7.5pt;
  color: #aaa;
  font-weight: 500;
  letter-spacing: 2px;
  pointer-events: none;
  user-select: none;
}
.cut-label::before, .cut-label::after {
  content: '';
  flex: 1;
  border-bottom: 1px dashed #ddd;
  margin: 0 10px;
}

.card-container:nth-child(4n),
.card-container:last-child {
  margin-bottom: 0;
}
.card-container:nth-child(4n) .cut-label,
.card-container:last-child .cut-label {
  display: none !important;
}

.card {
  width: var(--card-w);
  height: var(--card-h);
  position: relative;
  background: var(--white);
  background-size: cover;
  background-position: center;
  border: .3mm solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0,0,0,.03);
  padding-bottom: 5mm; 
}

/* Semitransparent safe-mask when a custom background picture is active */
.card.has-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.85);
  z-index: 1;
  pointer-events: none;
}

/* ── TOP BAR ── */
.top-bar {
  position: relative;
  z-index: 2;
  background: transparent;
  border-bottom: .3mm solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5mm;
  height: 13mm;
  flex-shrink: 0;
}

.brand-logo {
  height: 10mm;
  max-width: 55mm;
  width: auto;
  object-fit: contain;
  display: block;
}
.brand-mark {
  display: flex;
  align-items: baseline;
  gap: 1mm;
}
.brand-mark .m1 { font-size: 18pt; font-weight: 900; color: var(--dark); letter-spacing: 1px; text-transform: uppercase; line-height: 1; }
.brand-mark .m2 { font-size: 18pt; font-weight: 400; color: var(--mid); letter-spacing: 1px; text-transform: uppercase; line-height: 1; }

.brand-tag {
  font-size: 6.5pt;
  font-weight: 600;
  color: var(--mid);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 0;
  border-left: .3mm solid var(--dark);
  padding-left: 2.5mm;
}

/* ── BODY GRID ── */
.card-body {
  position: relative;
  z-index: 2;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 48mm;
  min-height: 0;
}

/* ── LEFT ── */
.left {
  padding: 2.5mm 4mm;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: .3mm solid var(--border);
}

.name-en {
  font-size: 20pt;
  font-weight: 800;
  color: var(--dark);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.0;
  outline: none;
}
.name-en:focus { outline: 1px solid var(--dark); }
.name-en:empty::before { content: attr(data-ph); color: #ccc; font-weight: 400; }

.name-sep {
  display: flex;
  align-items: center;
  margin: 1.5mm 0;
}
.name-sep .line {
  flex: 1;
  height: .3mm;
  background: var(--border);
}

.name-ar {
  font-family: 'Cairo', sans-serif;
  font-size: 13pt;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.1;
  direction: rtl;
  outline: none;
}
.name-ar:focus { outline: 1px solid var(--dark); }
.name-ar:empty::before { content: attr(data-ph); color: #ccc; font-weight: 400; direction: rtl; }

.translate-status { font-size: 6pt; color: #b1b1b1; min-height: 10px; margin-top: 1mm; font-weight: 500; }

/* Clean Modern Price Box */
.price-box {
  background: var(--white);
  border: .4mm solid var(--dark);
  border-radius: 2px;
  padding: 2mm 3mm 1mm 3mm;
  width: fit-content;
  min-width: 44mm;
  position: relative;
  margin-top: auto;
}
.price-box::after {
  content: 'PRICE';
  position: absolute;
  top: -1.8mm; left: 2mm;
  background: var(--dark);
  color: var(--white);
  font-size: 5pt;
  font-weight: 700;
  padding: .2mm 1mm;
  border-radius: 1px;
  letter-spacing: 0.5px;
}

.price-row {
  display: flex;
  align-items: flex-end;
  gap: 1mm;
  line-height: 1;
}
.price-num {
  font-size: 36pt;
  font-weight: 900;
  color: var(--dark);
  line-height: 0.8;
  letter-spacing: -1px;
  outline: none;
}
.price-num:focus { outline: 1px dashed var(--dark); }
.price-cur {
  font-size: 13pt;
  font-weight: 800;
  color: var(--dark);
  padding-bottom: 0.5mm;
}
.price-unit {
  font-size: 6.5pt;
  color: var(--mid);
  font-weight: 500;
  text-transform: uppercase;
  margin-top: 1.5mm;
  padding-top: 1mm;
  border-top: .3mm solid var(--border);
  font-family: 'Cairo', sans-serif;
  outline: none;
}

/* ── RIGHT ── */
.right {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 2mm;
  overflow: hidden;
  background: transparent;
}

/* ── PRODUCT IMAGE ── */
.img-area {
  position: relative;
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 2px;
  border: .3mm dashed #ccc;
  overflow: hidden;
  background: var(--light-gray);
}
.img-area:hover { border-color: var(--dark); border-style: solid; }
.img-area:hover .img-area-overlay { opacity: 1; }
.img-area:hover .product-img { opacity: .3; }

.product-img {
  max-width: 90%;
  max-height: 24mm;
  object-fit: contain;
  display: block;
}

.img-area-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .15s;
  z-index: 3;
}
.img-area-label {
  font-size: 6pt;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--dark);
  background: var(--white);
  padding: 1mm 2mm;
  border: .3mm solid var(--dark);
  border-radius: 2px;
}
.img-remove-btn {
  position: absolute;
  top: 1mm; right: 1mm;
  width: 4.5mm; height: 4.5mm;
  border-radius: 50%;
  background: var(--dark);
  color: white; border: none;
  font-size: 6pt; font-weight: 400; display: flex; align-items: center; justify-content: center;
  opacity: 0; z-index: 4; cursor: pointer;
}
.img-area:hover .img-remove-btn { opacity: 1; }

/* Country Dropdown */
.country-select {
  font-size: 7pt;
  font-family: inherit;
  padding: 2px 4px;
  border: 1px solid #ccc;
  border-radius: 2px;
  margin-bottom: 2px;
  max-width: 95%;
  z-index: 10;
  background: #fff;
  cursor: pointer;
}

/* ── MADE-IN BADGE ── */
.made-in-badge {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5mm 1mm;
  background: var(--light-gray);
  border-radius: 2px;
  border: .3mm solid var(--border);
  margin-top: 1.5mm;
  flex-shrink: 0;
}
.made-in-flags { display: flex; align-items: center; gap: 2mm; }
.made-in-text-wrap { display: flex; flex-direction: column; align-items: center; }
.made-in-en { font-size: 7pt; font-weight: 700; text-transform: uppercase; color: var(--dark); line-height: 1.1; }
.made-in-ar { font-family: 'Cairo', sans-serif; font-size: 7.5pt; font-weight: 700; color: var(--dark); line-height: 1.1; direction: rtl; }
.badge-flag {
  width: 5.5mm; height: 3.5mm;
  border-radius: 0px;
  border: .1mm solid rgba(0,0,0,0.1);
  background-size: cover; background-position: center;
}

/* Minimalist Clean-White BG Action Buttons Styling */
.bg-upload-btn, .bg-remove-btn {
  position: absolute;
  top: 1mm; left: 1mm;
  display: inline-flex;
  align-items: center;
  background: var(--white);
  color: var(--dark);
  border: .3mm solid #ccc;
  border-radius: 2px;
  padding: 2px 4px;
  font-size: 5.5pt; font-weight: 700;
  cursor: pointer;
  z-index: 50;
  transition: all 0.1s ease;
}
.bg-upload-btn:hover, .bg-remove-btn:hover {
  border-color: var(--dark);
  background: var(--light-gray);
}
.bg-remove-btn { top: 5.5mm; }

/* ══════════════════ PRINT ══════════════════ */
@media print {
  html, body { background: none !important; margin: 0; padding: 0; }
  .controls  { display: none !important; }
  .page { margin: 0 !important; padding: 0; box-shadow: none; width: var(--card-w) !important; }
  .card { box-shadow: none; border: .3mm solid var(--border); }
  .btn-remove, .img-area-overlay, .img-remove-btn, .translate-status, .country-select, .bg-upload-btn, .bg-remove-btn, label.bg-upload-btn { display: none !important; }
  .img-area { border: none; background: none; }
  .card-container { page-break-inside: avoid; break-inside: avoid; }
}
</style>

/* Translation: tries MyMemory first, falls back to Google Translate JSONP */
async function fetchTranslation(text, targetLang, callback) {
  // ── 1. MyMemory (free, CORS-friendly, no key needed) ──
  try {
    const res = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLang}`,
      { signal: AbortSignal.timeout(6000) }
    );
    if (res.ok) {
      const json = await res.json();
      const t = json?.responseData?.translatedText;
      if (t && t !== text) { callback(null, t); return; }
    }
  } catch (_) { /* fall through */ }

  // ── 2. Google Translate JSONP fallback ──
  const callbackName = 'gtCb_' + Math.round(Math.random() * 1e9);
  function cleanup() {
    const el = document.getElementById(callbackName);
    if (el) el.remove();
    delete window[callbackName];
  }
  const timer = setTimeout(() => { cleanup(); callback("Timeout"); }, 8000);

  window[callbackName] = function(data) {
    clearTimeout(timer); cleanup();
    try {
      if (data && data[0] && Array.isArray(data[0])) {
        const translated = data[0].filter(s => s?.[0]).map(s => s[0]).join('');
        if (translated) { callback(null, translated); return; }
      }
      callback("Structure unexpected");
    } catch(e) { callback(e); }
  };

  const script = document.createElement('script');
  script.id = callbackName;
  script.onerror = () => { clearTimeout(timer); cleanup(); callback("Network error"); };
  script.src = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function handleTranslationTyping(n) {
  const statusEl = document.getElementById(`ts${n}`);
  const sourceText = document.getElementById(`nameEn${n}`).innerText.trim();
  const targetEl = document.getElementById(`nameAr${n}`);

  clearTimeout(translationTimeouts[n]);
  
  if (!sourceText) {
    statusEl.textContent = "";
    return;
  }

  statusEl.textContent = "Translating... / جاري الترجمة";

  // Debounce API calls to prevent lookup performance issues during direct keystrokes
  translationTimeouts[n] = setTimeout(() => {
    fetchTranslation(sourceText, 'ar', (err, result) => {
      // Ignore stale callbacks if the user has already typed something new
      if (document.getElementById(`nameEn${n}`)?.innerText.trim() !== sourceText) return;
      if (!err && result) {
        targetEl.innerText = result;
        statusEl.textContent = "";
      } else {
        statusEl.textContent = "Translation failed / فشلت الترجمة";
      }
    });
  }, 900);
}

function createCard(defaultCountry = countriesData[0]) {

  ).join('');

  container.innerHTML = `
    <div class="card" id="card${n}">
      <button class="btn-remove no-print" onclick="removeCard(${n})" title="Remove this item">✕</button>

      <div class="top-bar">

             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="brand-mark" style="display:none;">

        </div>
        <span class="brand-tag">Quality Products</span>
      </div>

      <div class="card-body">
        <div class="left">
          <div>
            <div class="name-en" id="nameEn${n}" contenteditable="true" data-ph="ITEM NAME" spellcheck="false" oninput="handleTranslationTyping(${n})"></div>
            <div class="name-sep">
              <div class="line"></div>
            </div>
            <div class="name-ar" id="nameAr${n}" contenteditable="true" data-ph="اسم المنتج" spellcheck="false"></div>
            <div class="translate-status" id="ts${n}"></div>
          </div>
          <div class="price-box">
            <div class="price-row">
              <div class="price-num" contenteditable="true" spellcheck="false">0.000</div>
              <div class="price-cur">KD</div>
            </div>
            <div class="price-unit" contenteditable="true" spellcheck="false">/ KG &nbsp;|&nbsp; لكل كيلو</div>
          </div>
        </div>

        <div class="right" id="right${n}">
          <div class="img-area" onclick="document.getElementById('fileProduct${n}').click()">
            <img id="productImg${n}" class="product-img" src="" alt="">
            <div class="img-area-overlay">
              <span class="img-area-label">Upload</span>
            </div>
            <button class="img-remove-btn" onclick="event.stopPropagation();clearProduct('productImg${n}')">✕</button>
           
            <input type="file" id="fileProduct${n}" class="file-input-hidden" accept="image/*" onchange="loadProduct(this,'productImg${n}')">
          </div>

          <select class="country-select" onchange="updateCountry(this, ${n})">
            ${pickerOptions}
          </select>

          <div class="made-in-badge" id="madeInBadge${n}">
            <div class="made-in-flags">
              <span class="badge-flag" id="badgeFlag${n}L" style="background-image:url('${flag}')"></span>
              <div class="made-in-text-wrap">
                <span class="made-in-en" id="madeInEn${n}">Made in ${en}</span>
                <span class="made-in-ar" id="madeInAr${n}">صنع في ${ar}</span>
              </div>
              <span class="badge-flag" id="badgeFlag${n}R" style="background-image:url('${flag}')"></span>
            </div>
          </div>

          <label class="bg-upload-btn">
            BG <input type="file" class="file-input-hidden" accept="image/*" onchange="loadBg(this,'card${n}')">
          </label>
          <button class="bg-remove-btn" onclick="clearBg('card${n}')">✕ BG</button>
        </div>
      </div>
    </div>
    <div class="cut-label">✂ ─── CUT HERE ───</div>
  `;
  return container;
}

function updateCountry(selectEl, n) {
  const selectedCode = selectEl.value;
  const country = countriesData.find(c => c.code === selectedCode);
  if (!country) return;

  document.getElementById(`badgeFlag${n}L`).style.backgroundImage = `url('${country.flag}')`;
  document.getElementById(`badgeFlag${n}R`).style.backgroundImage = `url('${country.flag}')`;
  document.getElementById(`madeInEn${n}`).textContent = `Made in ${country.en}`;
  document.getElementById(`madeInAr${n}`).textContent = `صنع في ${country.ar}`;
}

function addCard(country) {
  const page = document.getElementById('page');
  page.appendChild(createCard(country));
}

function removeCard(n) {
  const container = document.getElementById('container' + n);
  if (container) container.remove();
}

function loadProduct(input, imgId) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { document.getElementById(imgId).src = ev.target.result; };
  r.readAsDataURL(f);
}
function clearProduct(imgId) { document.getElementById(imgId).src = ''; }

function loadBg(input, cardId) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const c = document.getElementById(cardId);
    c.style.backgroundImage = `url('${ev.target.result}')`;
    c.classList.add('has-bg');
  };
  r.readAsDataURL(f);
}
function clearBg(cardId) {
  const c = document.getElementById(cardId);
  c.style.backgroundImage = ''; c.classList.remove('has-bg');
}

document.addEventListener('DOMContentLoaded', () => {
  addCard(countriesData[0]);
});
</script>
</body>
</html>
